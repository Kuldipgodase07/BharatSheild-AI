apiVersion: apps/v1
kind: Deployment
metadata:
  name: bharatshield-backend
  namespace: bharatshield
  labels:
    app: bharatshield
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bharatshield
      component: backend
  template:
    metadata:
      labels:
        app: bharatshield
        component: backend
    spec:
      containers:
        - name: backend
          image: bharatshield/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bharatshield-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bharatshield-secrets
                  key: secret-key
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bharatshield-backend-svc
  namespace: bharatshield
spec:
  selector:
    app: bharatshield
    component: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
